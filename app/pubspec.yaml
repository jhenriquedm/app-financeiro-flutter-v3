name: app
description: "Aplicativo de controle financeiro desenvolvido em Flutter com MVVM, Provider e SQLite."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.0.1+1
  path: ^1.9.1
  intl: ^0.20.2

  # Máscara monetária
  flutter_multi_formatter: ^2.13.7
  flutter_riverpod: ^3.3.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true